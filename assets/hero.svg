<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">

  <defs>

```
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#020617"/>
  <stop offset="50%" stop-color="#081229"/>
  <stop offset="100%" stop-color="#0f172a"/>
</linearGradient>

<radialGradient id="planetGlow">
  <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
  <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
</radialGradient>
```

  </defs>

  <!-- Background -->

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Nebula -->

<ellipse
 cx="800"
 cy="110"
 rx="520"
 ry="130"
 fill="#2563eb"
 opacity="0.04"/>

  <!-- Static Stars -->

  <g fill="white">

```
<circle cx="120" cy="90" r="1.5">
  <animate attributeName="opacity" values="1;.3;1" dur="4s" repeatCount="indefinite"/>
</circle>

<circle cx="340" cy="140" r="1">
  <animate attributeName="opacity" values="1;.2;1" dur="3s" repeatCount="indefinite"/>
</circle>

<circle cx="620" cy="70" r="1.5">
  <animate attributeName="opacity" values="1;.4;1" dur="5s" repeatCount="indefinite"/>
</circle>

<circle cx="940" cy="90" r="1">
  <animate attributeName="opacity" values="1;.2;1" dur="4s" repeatCount="indefinite"/>
</circle>

<circle cx="1250" cy="80" r="1.5">
  <animate attributeName="opacity" values="1;.3;1" dur="6s" repeatCount="indefinite"/>
</circle>

<circle cx="1450" cy="120" r="1">
  <animate attributeName="opacity" values="1;.2;1" dur="5s" repeatCount="indefinite"/>
</circle>
```

  </g>

  <!-- Shooting Star 1 -->

  <g>

```
<line
  x1="0"
  y1="0"
  x2="120"
  y2="0"
  stroke="white"
  stroke-width="2"
  opacity="0">

  <animate
    attributeName="opacity"
    values="0;1;1;0"
    dur="1.8s"
    repeatCount="indefinite"/>

</line>

<circle
  cx="120"
  cy="0"
  r="3"
  fill="white"
  opacity="0">

  <animate
    attributeName="opacity"
    values="0;1;1;0"
    dur="1.8s"
    repeatCount="indefinite"/>

</circle>

<animateTransform
  attributeName="transform"
  type="translate"
  from="-300 80"
  to="1800 260"
  dur="1.8s"
  repeatCount="indefinite"/>
```

  </g>

