  <!-- Radar -->

  <g transform="translate(260 320)">

```
<circle r="80"
  stroke="#38bdf8"
  stroke-width="1"
  fill="none"
  opacity="0.15"/>

<circle r="55"
  stroke="#38bdf8"
  stroke-width="1"
  fill="none"
  opacity="0.15"/>

<circle r="30"
  stroke="#38bdf8"
  stroke-width="1"
