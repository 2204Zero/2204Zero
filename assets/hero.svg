  <!-- Meteor Definitions -->

  <defs>

    <linearGradient id="meteorTail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="meteorTail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>

    <filter id="meteorGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

  </defs>

  <!-- METEOR 1 -->

  <g>

    <g transform="rotate(-20)" opacity="0">

      <line
        x1="-180"
        y1="0"
        x2="0"
        y2="0"
        stroke="url(#meteorTail1)"
        stroke-width="4"
        stroke-linecap="round"/>

      <circle
        cx="0"
        cy="0"
        r="6"
        fill="white"
        filter="url(#meteorGlow)"/>

      <animateTransform
        attributeName="transform"
        type="translate"
        values="-300 120;-300 120;1700 320;1700 320"
        keyTimes="0;0.72;0.9;1"
        dur="8s"
        repeatCount="indefinite"/>

      <animate
        attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.72;0.75;0.9;1"
        dur="8s"
        repeatCount="indefinite"/>

    </g>

  </g>

  <!-- METEOR 2 -->

  <g>

    <g transform="rotate(-28)" opacity="0">

      <line
        x1="-140"
        y1="0"
        x2="0"
        y2="0"
        stroke="url(#meteorTail2)"
        stroke-width="3"
        stroke-linecap="round"/>

      <circle
        cx="0"
        cy="0"
        r="5"
        fill="white"
        filter="url(#meteorGlow)"/>

      <animateTransform
        attributeName="transform"
        type="translate"
        values="1600 40;1600 40;500 260;500 260"
        keyTimes="0;0.82;0.94;1"
        dur="11s"
        repeatCount="indefinite"/>

      <animate
        attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.82;0.84;0.94;1"
        dur="11s"
        repeatCount="indefinite"/>

    </g>

  </g>

  <!-- METEOR 3 -->

  <g>

    <g transform="rotate(-15)" opacity="0">

      <line
        x1="-220"
        y1="0"
        x2="0"
        y2="0"
        stroke="url(#meteorTail1)"
        stroke-width="5"
        stroke-linecap="round"/>

      <circle
        cx="0"
        cy="0"
        r="7"
        fill="white"
        filter="url(#meteorGlow)"/>

      <animateTransform
        attributeName="transform"
        type="translate"
        values="400 20;400 20;1800 420;1800 420"
        keyTimes="0;0.88;0.96;1"
        dur="14s"
        repeatCount="indefinite"/>

      <animate
        attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.88;0.9;0.96;1"
        dur="14s"
        repeatCount="indefinite"/>

    </g>

  </g>
```

