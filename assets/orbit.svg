<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <filter id="blurGlow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect
    width="100%"
    height="100%"
    fill="transparent"/>

  <!-- Outer Orbit -->

  <circle
    cx="450"
    cy="225"
    r="170"
    fill="none"
    stroke="#38bdf8"
    stroke-opacity="0.12"/>

  <!-- Inner Orbit -->

  <circle
    cx="450"
    cy="225"
    r="110"
    fill="none"
    stroke="#38bdf8"
    stroke-opacity="0.18"/>

  <!-- Core Glow -->

  <circle
    cx="450"
    cy="225"
    r="55"
    fill="#60a5fa"
    opacity="0.15"
    filter="url(#blurGlow)"/>

  <!-- Core -->

  <circle
    cx="450"
    cy="225"
    r="32"
    fill="url(#coreGlow)">

    <animate
      attributeName="r"
      values="32;36;32"
      dur="3s"
      repeatCount="indefinite"/>

  </circle>

  <text
    x="450"
    y="230"
    text-anchor="middle"
    fill="white"
    font-family="monospace"
    font-size="12"
    font-weight="bold">

    ZERO

  </text>

  <!-- INNER ORBIT -->

  <g>

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 450 225"
      to="360 450 225"
      dur="20s"
      repeatCount="indefinite"/>

    <image
      href="./icons/java.svg"
      x="542"
      y="205"
      width="40"
      height="40"/>

    <image
      href="./icons/python.svg"
      x="430"
      y="92"
      width="40"
      height="40"/>

    <image
      href="./icons/docker.svg"
      x="318"
      y="205"
      width="40"
      height="40"/>

    <image
      href="./icons/linux.svg"
      x="430"
      y="318"
      width="40"
      height="40"/>

  </g>

  <!-- OUTER ORBIT -->

  <g>

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="360 450 225"
      to="0 450 225"
      dur="40s"
      repeatCount="indefinite"/>

    <image
      href="./icons/github.svg"
      x="600"
      y="205"
      width="44"
      height="44"/>

    <image
      href="./icons/js.svg"
      x="428"
      y="34"
      width="44"
      height="44"/>

    <image
      href="./icons/vscode.svg"
      x="256"
      y="205"
      width="44"
      height="44"/>

    <image
      href="./icons/django.svg"
      x="428"
      y="376"
      width="44"
      height="44"/>

  </g>

</svg>
