```svg
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

  </defs>

  <rect
    width="100%"
    height="100%"
    fill="transparent"/>

  <!-- Orbit Rings -->

  <circle
    cx="400"
    cy="200"
    r="90"
    fill="none"
    stroke="#38bdf8"
    opacity="0.15"/>

  <circle
    cx="400"
    cy="200"
    r="140"
    fill="none"
    stroke="#38bdf8"
    opacity="0.10"/>

  <!-- Core Glow -->

  <circle
    cx="400"
    cy="200"
    r="40"
    fill="#60a5fa"
    opacity="0.2"
    filter="url(#softGlow)"/>

  <!-- Core -->

  <circle
    cx="400"
    cy="200"
    r="28"
    fill="url(#coreGlow)">

    <animate
      attributeName="r"
      values="28;32;28"
      dur="3s"
      repeatCount="indefinite"/>

  </circle>

  <text
    x="400"
    y="205"
    text-anchor="middle"
    fill="white"
    font-family="monospace"
    font-size="12"
    font-weight="bold">

    ZERO

  </text>

  <!-- INNER ORBIT -->

  <g>

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 400 200"
      to="360 400 200"
      dur="20s"
      repeatCount="indefinite"/>

    <circle cx="490" cy="200" r="18" fill="#111827"/>
    <text x="490" y="205"
      text-anchor="middle"
      fill="#60a5fa"
      font-family="monospace"
      font-size="10">Java</text>

    <circle cx="400" cy="110" r="18" fill="#111827"/>
    <text x="400" y="115"
      text-anchor="middle"
      fill="#60a5fa"
      font-family="monospace"
      font-size="9">Python</text>

    <circle cx="310" cy="200" r="18" fill="#111827"/>
    <text x="310" y="205"
      text-anchor="middle"
      fill="#60a5fa"
      font-family="monospace"
      font-size="8">Docker</text>

    <circle cx="400" cy="290" r="18" fill="#111827"/>
    <text x="400" y="295"
      text-anchor="middle"
      fill="#60a5fa"
      font-family="monospace"
      font-size="8">Linux</text>

  </g>

  <!-- OUTER ORBIT -->

  <g>

    <animateTransform
      attributeName="transform"
      type="rotate"
      from="360 400 200"
      to="0 400 200"
      dur="40s"
      repeatCount="indefinite"/>

    <circle cx="540" cy="200" r="20" fill="#111827"/>
    <text x="540" y="205"
      text-anchor="middle"
      fill="#93c5fd"
      font-family="monospace"
      font-size="8">GitHub</text>

    <circle cx="400" cy="60" r="20" fill="#111827"/>
    <text x="400" y="65"
      text-anchor="middle"
      fill="#93c5fd"
      font-family="monospace"
      font-size="8">JS</text>

    <circle cx="260" cy="200" r="20" fill="#111827"/>
    <text x="260" y="205"
      text-anchor="middle"
      fill="#93c5fd"
      font-family="monospace"
      font-size="8">VSCode</text>

    <circle cx="400" cy="340" r="20" fill="#111827"/>
    <text x="400" y="345"
      text-anchor="middle"
      fill="#93c5fd"
      font-family="monospace"
      font-size="8">Django</text>

  </g>

</svg>
